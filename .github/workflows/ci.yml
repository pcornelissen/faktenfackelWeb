name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm build

      - name: Collect commit messages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: commits
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits.*.message) }}
        run: |
          MESSAGES=$(echo "$COMMITS_JSON" | jq -r '.[]' | head -1 | sed 's/Co-Authored-By:.*//' | tr -d '\n' | tr -dc 'a-zA-Z0-9 _.,:;!?()/-' | cut -c1-60)
          echo "messages=${MESSAGES:-deploy}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler --cwd .output deploy --message "$DEPLOY_MESSAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_MESSAGE: ${{ steps.commits.outputs.messages }}

      - name: Notify IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/indexnow.mjs

      - name: Install Playwright
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Smoke Tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm test:smoke
        env:
          SMOKE_TEST_URL: https://faktenfackel.de
