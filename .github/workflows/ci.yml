name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm build

      - name: Collect commit messages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: commits
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits.*.message) }}
        run: |
          MESSAGES=$(echo "$COMMITS_JSON" | jq -r '.[]' | head -1 | sed 's/Co-Authored-By:.*//' | tr -d '\n' | tr -dc 'a-zA-Z0-9 _.,:;!?()/-' | cut -c1-60)
          echo "messages=${MESSAGES:-deploy}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler --cwd .output deploy --message "$DEPLOY_MESSAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_MESSAGE: ${{ steps.commits.outputs.messages }}

      - name: Deploy Graph to D1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # generateSourceIndex.ts schreibt Cache + Index in ../../knowledge-mcp/ (im lokalen
          # Dev ist das das Schwesterverzeichnis). In CI existiert es nicht, wir legen es
          # ad-hoc an. Sourceindex/Cache werden im CI nicht persistiert; entscheidend ist das
          # SQL-Dump unter website/.graph-d1.sql, das der D1-Import danach einspielt.
          mkdir -p ../knowledge-mcp
          pnpm run deploy:graph
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/indexnow.mjs

      - name: D1 Warm-up (Fire & Forget)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Triggert D1-Initialisierung ohne auf Antwort zu warten.
          # curl bricht nach 10s ab; Cloudflare Worker läuft weiter.
          curl -sf --max-time 10 -o /dev/null https://faktenfackel.de/faktenchecks/ || true

      - name: Install Playwright
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Smoke Tests

        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm test:smoke
        env:
          SMOKE_TEST_URL: https://faktenfackel.de
