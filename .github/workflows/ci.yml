name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Content lint (changed files)
        run: pnpm check:content --changed

      - name: Build
        run: pnpm build

      - name: Verify dev routes are excluded
        run: pnpm verify:dev-excluded

      - name: Check built HTML
        run: pnpm check:build
