name: Deploy (Hetzner)

# Triggers:
#   - successful CI on main: build + deploy to Hetzner.
#   - workflow_dispatch: manual re-deploy without code change (e.g. to
#     refresh DB content from latest sources).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Least privilege: nur Code lesen (Checkout). Kein Schreibzugriff aufs Repo noetig.
permissions:
  contents: read

# Avoid concurrent deploys to the same host
concurrency:
  group: deploy-hetzner-faktenfackel
  cancel-in-progress: false

jobs:
  build-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      SSH_USER: deploy
      PROJECT: faktenfackel
      SMOKE_URL: ${{ secrets.HETZNER_SMOKE_URL }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute git sha (short)
        id: sha
        run: |
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Build the Docker image. We rely on the Dockerfile multi-stage build
      # to: (a) run `pnpm build` with NITRO_PRESET=node-server, (b) run
      # generateSourceIndex.ts to produce .data/graph.sqlite, (c) bundle
      # both content+graph SQLite files into the runtime image.
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Exposes ACTIONS_RUNTIME_TOKEN/-URL into the env so `buildx` can read
      # and write the GitHub Actions cache backend (type=gha). Without this,
      # --cache-to/--cache-from type=gha cannot reach the cache service.
      - name: Expose GitHub Actions runtime for buildx cache
        uses: crazy-max/ghaction-github-runtime@v3

      # The deps stage (apt + better-sqlite3 native build + pnpm install) is
      # stable across deploys as long as pnpm-lock.yaml is unchanged, so we
      # cache it via the GHA backend. mode=max also caches intermediate
      # (deps/builder) layers, not just the final image. ignore-error keeps a
      # cache-export hiccup from ever failing the deploy. The builder stage
      # (COPY . . + pnpm build) still re-runs on any content change.
      - name: Build image to tar
        env:
          SHA: ${{ steps.sha.outputs.short }}
          OG_IMAGE_SECRET: ${{ secrets.NUXT_OG_IMAGE_SECRET }}
        run: |
          docker buildx build \
            --file Dockerfile \
            --build-arg "NUXT_OG_IMAGE_SECRET=${OG_IMAGE_SECRET}" \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max,ignore-error=true" \
            --tag "faktenfackel:${SHA}" \
            --tag "faktenfackel:latest" \
            --output "type=docker,dest=image.tar" \
            .

      - name: Compute image SHA-256
        id: image
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: |
          TAR_NAME="faktenfackel-${SHA}.tar"
          mv image.tar "${TAR_NAME}"
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"
          SIZE_MB=$(du -m "${TAR_NAME}" | cut -f1)
          echo "size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "tar_name=${TAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "Image size: ${SIZE_MB} MB"

      # ------------------------------------------------------------------
      # SSH setup: HETZNER_SSH_KEY secret holds the private key paired
      # with the public key in /home/deploy/.ssh/authorized_keys.
      # ------------------------------------------------------------------
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${SSH_KEY}" > ~/.ssh/hetzner
          ssh-keyscan -H "${HOST}" >> ~/.ssh/known_hosts

      # ------------------------------------------------------------------
      # Upload tar + sha sidecar, then trigger deploy.sh on the host.
      # ------------------------------------------------------------------
      - name: SCP image to host
        env:
          TAR_NAME: ${{ steps.image.outputs.tar_name }}
        run: |
          # -O forces legacy scp protocol (server-side `scp -t`) which our
          # ci-restricted wrapper allow-lists. Modern scp defaults to SFTP
          # subsystem, which is intentionally NOT allowed by the wrapper.
          scp -O -i ~/.ssh/hetzner \
            "${TAR_NAME}" \
            "${TAR_NAME}.sha256" \
            "${SSH_USER}@${HOST}:/opt/${PROJECT}/incoming/"

      # Pausiert die faktenfackel-Monitore, damit der kurze DOWN→UP-Flip beim
      # Container-Cutover keinen Falsch-Alarm auslöst. Gezielt per Tag, damit
      # andere Sites auf demselben UptimeRobot-Account unberührt bleiben.
      # Best effort: ein API-Fehler darf den Deploy nicht blockieren.
      - name: Pause UptimeRobot monitors
        continue-on-error: true
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
        run: node scripts/uptimerobot-monitors.mjs pause

      - name: Run deploy.sh on host
        env:
          SHA: ${{ steps.sha.outputs.short }}
        run: |
          ssh -i ~/.ssh/hetzner \
            "${SSH_USER}@${HOST}" \
            "/opt/${PROJECT}/bin/deploy.sh ${SHA}"

      # ------------------------------------------------------------------
      # Smoke tests against staging URL (or production after cutover).
      # SMOKE_URL secret can be flipped without code changes.
      # ------------------------------------------------------------------
      # Cache the downloaded browser binary keyed on the lockfile (which pins
      # the Playwright version). On a hit, the install step skips the ~120 MB
      # chromium download and only ensures the apt system libs are present.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        env:
          SMOKE_TEST_URL: ${{ env.SMOKE_URL }}
        run: pnpm test:smoke

      # Monitore wieder aktivieren – auch wenn Deploy oder Smoke-Test scheitern,
      # sonst bliebe die Überwachung dauerhaft pausiert (blind). Schlägt dieser
      # Step fehl, ist der Job rot: stecken gebliebene Pause muss auffallen.
      - name: Resume UptimeRobot monitors
        if: always()
        env:
          UPTIMEROBOT_API_KEY: ${{ secrets.UPTIMEROBOT_API_KEY }}
        run: node scripts/uptimerobot-monitors.mjs start

      - name: Notify IndexNow (only on production cutover)
        if: env.SMOKE_URL == 'https://faktenfackel.de'
        run: node scripts/indexnow.mjs

      - name: Summary
        if: always()
        env:
          SHA: ${{ steps.sha.outputs.short }}
          SIZE: ${{ steps.image.outputs.size_mb }}
        run: |
          {
            echo "### Deploy summary"
            echo "- SHA: \`${SHA}\`"
            echo "- Image size: ${SIZE} MB"
            echo "- Smoke target: ${SMOKE_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
