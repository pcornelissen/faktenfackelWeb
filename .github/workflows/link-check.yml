name: Daily Link Check

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

# Least privilege: Code lesen (Checkout) + Issues schreiben (gh issue create/comment
# bei fehlgeschlagenem Link-Check). Kein weiterer Schreibzugriff noetig.
permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full content lint
        id: check
        run: pnpm check:content 2>&1 | tee /tmp/check-output.txt
        continue-on-error: true

      - name: Create issue on failure
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_OUTPUT: /tmp/check-output.txt
        run: |
          BODY=$(tail -100 "$CHECK_OUTPUT")
          TODAY=$(date -u +%Y-%m-%d)
          EXISTING=$(gh issue list --label "link-check" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$(cat <<EOF
          ## Link-Check $TODAY

          \`\`\`
          $BODY
          \`\`\`
          EOF
          )"
          else
            gh issue create \
              --title "Link-Check: Fehler gefunden ($TODAY)" \
              --label "link-check" \
              --body "$(cat <<EOF
          Der taegliche Link-Check hat Fehler gefunden.

          \`\`\`
          $BODY
          \`\`\`
          EOF
          )"
          fi
